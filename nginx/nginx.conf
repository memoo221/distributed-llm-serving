worker_processes auto;
error_log stderr warn;

events {
    worker_connections 2048;
}

http {
    upstream master_nodes {
        # These names assume Docker Compose / Kubernetes service discovery.
        # If you run locally without container DNS, replace them with real IPs or localhost ports.
        # Least connections works well for LLM requests because request times
        # can vary a lot from one prompt to another.
        least_conn;
        keepalive 32;

        server master1:7000 max_fails=3 fail_timeout=10s;
        server master2:7000 max_fails=3 fail_timeout=10s;
        server master3:7000 max_fails=3 fail_timeout=10s;
        server master4:7000 max_fails=3 fail_timeout=10s;
    }

    server {
        listen 8008;
        server_name _;

        client_max_body_size 10m;

        location = /nginx/health {
            access_log off;
            add_header Content-Type text/plain;
            return 200 "nginx ok\n";
        }

        location / {
            proxy_pass http://master_nodes;

            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-Id $request_id;
            
            proxy_connect_timeout 2s;
            proxy_send_timeout 60s;
            proxy_read_timeout 300s;
            send_timeout 60s;

            proxy_buffering off;

            proxy_next_upstream error timeout invalid_header http_500 http_502 http_503 http_504;
            proxy_next_upstream_tries 3;
            proxy_next_upstream_timeout 15s;
        }
    }
}
