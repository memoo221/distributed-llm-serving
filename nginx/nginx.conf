worker_processes auto;
error_log stderr warn;

events {
    worker_connections 2048;
}

http {
    # Pick a master_id per request for the RAG pipeline.
    # This is a simple deterministic load split (not least_conn).
    # RAG uses this header to forward to the chosen master.
    split_clients "${remote_addr}${request_id}" $rag_master_id {
        50% master1;
        *   master2;
    }

    upstream master_nodes {
        # These names assume Docker Compose / Kubernetes service discovery.
        # If you run locally without container DNS, replace them with real IPs or localhost ports.
        # Least connections works well for LLM requests because request times
        # can vary a lot from one prompt to another.
        least_conn;
        keepalive 32;

        server master1:7000 max_fails=3 fail_timeout=10s;
        server master2:7000 max_fails=3 fail_timeout=10s;
        # server master3:7000 max_fails=3 fail_timeout=10s;
        # server master4:7000 max_fails=3 fail_timeout=10s;
    }

    upstream rag_service {
        keepalive 16;
        server rag:8090 max_fails=3 fail_timeout=10s;
    }

    server {
        listen 8008;
        server_name _;

        client_max_body_size 10m;

        location = /nginx/health {
            access_log off;
            add_header Content-Type text/plain;
            return 200 "nginx ok\n";
        }

        location /rag/ {
            proxy_pass http://rag_service/;

            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-Id $request_id;
            proxy_set_header X-Master-Id $rag_master_id;

            proxy_connect_timeout 2s;
            proxy_send_timeout 60s;
            proxy_read_timeout 800s;
            send_timeout 60s;

            proxy_buffering off;

            proxy_next_upstream error timeout invalid_header http_500 http_502 http_503 http_504;
            proxy_next_upstream_tries 3;
            proxy_next_upstream_timeout 15s;
        }

        location / {
            proxy_pass http://master_nodes;

            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-Id $request_id;
            
            proxy_connect_timeout 2s;
            proxy_send_timeout 60s;
            proxy_read_timeout 800s;
            send_timeout 60s;

            proxy_buffering off;

            proxy_next_upstream error timeout invalid_header http_500 http_502 http_503 http_504;
            proxy_next_upstream_tries 3;
            proxy_next_upstream_timeout 15s;
        }
    }
}
