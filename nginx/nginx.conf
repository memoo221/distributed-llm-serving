worker_processes auto;
error_log stderr warn;

events {
    worker_connections 2048;
}

http {
    # Pick a master_id per request for the RAG pipeline.
    # This is a simple deterministic load split (not least_conn).
    # RAG uses this header to forward to the chosen master.
    split_clients "${remote_addr}${request_id}" $rag_master_id {
        50% master1;
        *   master2;
    }

    upstream master_nodes {
        # These names assume Docker Compose / Kubernetes service discovery.
        # If you run locally without container DNS, replace them with real IPs or localhost ports.
        # Least connections works well for LLM requests because request times
        # can vary a lot from one prompt to another.
        least_conn;
        keepalive 32;

        # max_fails=2: a transient hiccup (one keepalive race, one network
        # blip) won't disable the upstream, but a genuinely-dead master is
        # still excluded within ~2 failed requests. max_fails=1 was too
        # aggressive — under burst load a single "upstream prematurely closed"
        # would mark the SURVIVING master down, leaving nginx with zero
        # upstreams and surfacing as 502 to the client.
        # fail_timeout=10s: short re-probe window so a recovered master
        # rejoins the pool quickly.
        server master1:7000 max_fails=2 fail_timeout=10s;
        server master2:7000 max_fails=2 fail_timeout=10s;
    }

    upstream rag_service {
        keepalive 16;
        server rag:8090 max_fails=3 fail_timeout=10s;
    }

    server {
        listen 8008;
        server_name _;

        client_max_body_size 10m;

        location = /nginx/health {
            access_log off;
            add_header Content-Type text/plain;
            return 200 "nginx ok\n";
        }

        location /rag/ {
            proxy_pass http://rag_service/;

            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-Id $request_id;
            proxy_set_header X-Master-Id $rag_master_id;

            # Bumped from 2s. Under 1000 concurrency the master can briefly
            # take >2s to ACCEPT a new TCP connection while it processes the
            # backlog; 2s caused tail requests to 504 from nginx (not from
            # the master's own deadline). 10s is generous but only matters
            # when the master is genuinely unhealthy.
            proxy_connect_timeout 10s;
            proxy_send_timeout 60s;
            proxy_read_timeout 800s;
            send_timeout 60s;

            proxy_buffering off;

            proxy_next_upstream error timeout invalid_header http_500 http_502 http_503 http_504;
            proxy_next_upstream_tries 3;
            # Bumped from 15s. With 10s connect timeout × 3 attempts, 15s
            # was tight — nginx could give up before exhausting its retry
            # budget under brief master overload, returning 504 instead of
            # the upstream's actual response.
            proxy_next_upstream_timeout 60s;
        }

        location / {
            proxy_pass http://master_nodes;

            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-Id $request_id;
            
            # Bumped from 2s. Under 1000 concurrency the master can briefly
            # take >2s to ACCEPT a new TCP connection while it processes the
            # backlog; 2s caused tail requests to 504 from nginx (not from
            # the master's own deadline). 10s is generous but only matters
            # when the master is genuinely unhealthy.
            proxy_connect_timeout 10s;
            proxy_send_timeout 60s;
            proxy_read_timeout 800s;
            send_timeout 60s;

            proxy_buffering off;

            proxy_next_upstream error timeout invalid_header http_500 http_502 http_503 http_504;
            proxy_next_upstream_tries 3;
            # Bumped from 15s. With 10s connect timeout × 3 attempts, 15s
            # was tight — nginx could give up before exhausting its retry
            # budget under brief master overload, returning 504 instead of
            # the upstream's actual response.
            proxy_next_upstream_timeout 60s;
        }
    }
}
