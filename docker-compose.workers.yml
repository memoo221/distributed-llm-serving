version: '3.8'

services:
  cpu_worker_1:
    build:
      context: .
      dockerfile: Dockerfile.cpu
    container_name: cpu_worker_1
    environment:
      - MODEL_PATH=/app/models/qwen2.5-0.5b
      - WORKER_ID=worker_1
    ports:
      - "9001:9001"
    volumes:
      - ./models:/app/models:ro
    restart: unless-stopped

