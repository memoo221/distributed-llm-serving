services:
  nginx:
    image: nginx:1.27-alpine
    container_name: distributed-nginx
    ports:
      - "8008:8008"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - master1
      - master2
      # - master3
      # - master4

  master1:
    build:
      context: .
      dockerfile: master/Dockerfile.mock
    container_name: master1
    environment:
      MASTER_ID: master1

  master2:
    build:
      context: .
      dockerfile: master/Dockerfile.mock
    container_name: master2
    environment:
      MASTER_ID: master2

  # master3:
  #   build:
  #     context: .
  #     dockerfile: master/Dockerfile.mock
  #   container_name: master3
  #   environment:
  #     MASTER_ID: master3

  # master4:
  #   build:
  #     context: .
  #     dockerfile: master/Dockerfile.mock
  #   container_name: master4
  #   environment:
  #     MASTER_ID: master4

  cpu_worker:
    build:
      context: .
      dockerfile: Dockerfile.cpu
    container_name: cpu_worker
    environment:
      - MODEL_PATH=/app/models/qwen2.5-0.5b
    ports:
      - "9001:9001"
    volumes:
      - ./models:/app/models:ro
    restart: unless-stopped
