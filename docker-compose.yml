services:
  nginx:
    image: nginx:1.27-alpine
    container_name: distributed-nginx
    ports:
      - "8008:8008"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - rag
      - master1
      - master2
      # - master3
      # - master4

  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

  rag:
    build:
      context: .
      dockerfile: rag/Dockerfile.rag
    container_name: rag
    environment:
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - QDRANT_COLLECTION=dis-content
      - EMBEDDING_MODEL=all-MiniLM-L6-v2
      - MASTER_URLS={"master1":"http://master1:7000","master2":"http://master2:7000"}
      - RAG_ROOT_PATH=/rag
    depends_on:
      - qdrant
      - master1
      - master2

  master1:
    build:
      context: .
      dockerfile: master/Dockerfile.master_node
    container_name: master1
    ports:
      - "7001:7000"
    environment:
      MASTER_ID: master1
      # GPU workers (Thunder) register themselves via heartbeat — no need to
      # bootstrap them since their public IP isn't known until they boot.
      WORKERS_BOOTSTRAP: '[{"worker_id":"worker_1_1","url":"http://cpu_worker_1_1:9001","device_type":"cpu"}]'


  master2:
    build:
      context: .
      dockerfile: master/Dockerfile.master_node
    container_name: master2
    ports:
      - "7002:7000"
    environment:
      MASTER_ID: master2
      WORKERS_BOOTSTRAP: '[{"worker_id":"worker_2_1","url":"http://cpu_worker_2_1:9001","device_type":"cpu"}]'

  cpu_worker_1_1:
    build:
      context: .
      dockerfile: workers/Dockerfile.cpu
    container_name: cpu_worker_1_1
    environment:
      - MODEL_PATH=/app/models/qwen2.5-0.5b
      - WORKER_ID=worker_1_1
      - MASTER_URL=http://master1:7000
      - SELF_URL=http://cpu_worker_1_1:9001
    ports:
      - "9001:9001"
    volumes:
      - ./models:/app/models:ro
    restart: unless-stopped

  groq_worker_1_2:
    profiles: ["groq"]
    build:
      context: .
      dockerfile: workers/Dockerfile.groq
    container_name: groq_worker_1_2
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY_1}
      - WORKER_ID=groq_worker_1_2
      - MASTER_URL=http://master1:7000
      - SELF_URL=http://groq_worker_1_2:8000
    ports:
      - "8000:8000"
    restart: unless-stopped
  groq_worker_1_3:
    profiles: ["groq"]
    build:
      context: .
      dockerfile: workers/Dockerfile.groq
    container_name: groq_worker_1_3
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY_2}
      - WORKER_ID=groq_worker_1_3
      - MASTER_URL=http://master1:7000
      - SELF_URL=http://groq_worker_1_3:8000
    ports:
      - "8002:8000"
    restart: unless-stopped
  groq_worker_1_4:
    profiles: ["groq"]
    build:
      context: .
      dockerfile: workers/Dockerfile.groq
    container_name: groq_worker_1_4
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY_3}
      - WORKER_ID=groq_worker_1_4
      - MASTER_URL=http://master1:7000
      - SELF_URL=http://groq_worker_1_4:8000
    ports:
      - "8003:8000"
    restart: unless-stopped

  # cpu_worker_2_1:
  #     build:
  #       context: .
  #       dockerfile: workers/Dockerfile.cpu
  #     container_name: cpu_worker_2_1
  #     environment:
  #       - MODEL_PATH=/app/models/qwen2.5-0.5b
  #       - WORKER_ID=worker_2_1
  #       - MASTER_URL=http://master2:7000
  #       - SELF_URL=http://cpu_worker_2_1:9001
  #     ports:
  #       - "9002:9001"
  #     volumes:
  #       - ./models:/app/models:ro
  #     restart: unless-stopped
  
  groq_worker_2_2:
    profiles: ["groq"]
    build:
      context: .
      dockerfile: workers/Dockerfile.groq
    container_name: groq_worker_2_2
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY_4}
      - WORKER_ID=groq_worker_2_2
      - MASTER_URL=http://master2:7000
      - SELF_URL=http://groq_worker_2_2:8000
    ports:
      - "8001:8000"
    restart: unless-stopped
  groq_worker_2_3:
    profiles: ["groq"]
    build:
      context: .
      dockerfile: workers/Dockerfile.groq
    container_name: groq_worker_2_3
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY_5}
      - WORKER_ID=groq_worker_2_3
      - MASTER_URL=http://master2:7000
      - SELF_URL=http://groq_worker_2_3:8000
    ports:
      - "8004:8000"
    restart: unless-stopped
  groq_worker_2_4:
    profiles: ["groq"]
    build:
      context: .
      dockerfile: workers/Dockerfile.groq
    container_name: groq_worker_2_4
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY_6}
      - WORKER_ID=groq_worker_2_4
      - MASTER_URL=http://master2:7000
      - SELF_URL=http://groq_worker_2_4:8000
    ports:
      - "8005:8000"
    restart: unless-stopped

volumes:
  # Qdrant persistence for ingested embeddings. Without this declaration
  # docker compose rejects the file with 'undefined volume qdrant_data'.
  qdrant_data:

